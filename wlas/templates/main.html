<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}BSF System{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* ================= COLORS ================= */
        :root {
            --primary: #0864AF;
            --secondary: #38574d;
            --danger: #de0500;
            --accent: #f6b418;
            --white: #ffffff;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        /* NAVBAR */
        nav {
            background: var(--white);
            display: flex;
            justify-content: space-between;
            padding: 15px 30px;
            border-bottom: 2px solid #eee;
        }

        nav a {
            text-decoration: none;
            color: var(--secondary);
            margin: 0 10px;
        }

        /* HERO */
        .hero {
            height: 90vh;
            background: linear-gradient(rgba(8,100,175,0.85), rgba(56,87,77,0.85)),
            url('/static/images/bsf.jpg');
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }

        .hero h1 {
            font-size: 50px;
            margin: 0;
        }

        .btn {
            background: var(--accent);
            padding: 12px 25px;
            color: black;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
            margin-top: 15px;
        }

        /* SECTIONS */
        .section {
            padding: 60px;
            text-align: center;
        }

        .grid {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            padding: 20px;
            width: 250px;
            border-radius: 10px;
            border-left: 5px solid var(--primary);
        }

        /* LIVE STATUS */
        .live {
            background: var(--secondary);
            color: white;
        }

        footer {
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>

<body>

<nav>
    <div><b>BSF DUCE</b></div>
    <div>
        <a href="/">Home</a>
        <a href="/data">Data</a>
        <a href="/about">About</a>
    </div>
</nav>

{% block content %}{% endblock %}

{% block js_code %}{% endblock %}

<footer>
    © 2026 BSF Farming System - DUCE
</footer>

</body>
</html>
