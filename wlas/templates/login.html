{% extends 'main.html' %}
{% load static %}

{% block title %}Login - BSF System{% endblock %}

{% block content %}

<div style="max-width: 400px; margin: 50px auto; padding: 20px; background: #fff; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1);">

    <h2 style="text-align:center;">Login</h2>

    <form method="POST">
        {% csrf_token %}
       
        <div style="margin-bottom: 15px;">
            <input name="username" placeholder="Username"
                   style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px;">
        </div>

        
        <div style="margin-bottom: 15px;">
            <input type="password" name="password" placeholder="Password"
                   style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px;">
        </div>

        <button type="submit"
                style="width:100%; padding:10px; background:#007bff; color:white; border:none; border-radius:5px;">
            Login
        </button>

        {% if error %}
        <p style="color:red; text-align:center; margin-top:10px;">
            {{ error }}
        </p>
        {% endif %}

    </form>

</div>

{% endblock %}
